# =====================================================
# Flink MinIO 迁移项目配置文件
# =====================================================
#
# 本配置文件包含 MinIO 连接信息和 Flink 相关配置。
# 从 SeaweedFS 迁移到 MinIO 时，主要修改以下配置：
# 1. minio.endpoint: 从 SeaweedFS 地址改为 MinIO 地址
# 2. minio.access-key / minio.secret-key: 改为 MinIO 的密钥
# 3. Flink Checkpoint 路径协议从 file:// 或 hdfs:// 改为 s3://
#

server:
  port: 8080

# =====================================================
# SeaweedFS 配置（迁移前验证用）
# =====================================================
# 如果你有 SeaweedFS 环境，配置以下信息用于迁移前验证。
# 如果没有 SeaweedFS 环境，将 enabled 设为 false 或删除此配置。
#
# SeaweedFS 有三种访问模式：
# 1. 挂载模式：Filer 挂载为本地目录，使用 file:// 协议
# 2. Filer HTTP API 模式：通过 HTTP API 访问（本配置支持）
# 3. S3 Gateway 模式：通过 S3 协议访问
#
seaweedfs:
  # 是否启用 SeaweedFS 验证
  # 如果没有 SeaweedFS 环境，设为 false
  enabled: false

  # SeaweedFS Filer HTTP API 地址
  # 示例：http://seaweedfs-dev-filer.geip-xa-dev-gdmp:8888
  filer-url: http://localhost:8888

  # Checkpoint 在 SeaweedFS 中的存储路径
  checkpoint-path: /flink/checkpoints

  # 连接超时（毫秒）
  connect-timeout: 5000

  # 读取超时（毫秒）
  read-timeout: 10000

# =====================================================
# MinIO 配置（迁移后使用）
# =====================================================
minio:
  # MinIO 服务地址（S3 endpoint）
  # 本地开发环境使用 localhost:9000
  # 生产环境改为实际的 MinIO 服务地址
  endpoint: http://localhost:9000

  # 访问密钥
  # MinIO 默认为 minioadmin / minioadmin
  # 生产环境请使用强密码
  access-key: minioadmin
  secret-key: minioadmin

  # 存储 Checkpoint 的 Bucket 名称
  bucket: flink-checkpoints

  # Checkpoint 在 Bucket 中的路径前缀
  checkpoint-path: flink/checkpoints

  # S3 Path-Style Access（MinIO 需要设为 true，AWS S3 设为 false）
  s3-path-style-access: true

# =====================================================
# Flink 配置
# =====================================================
flink:
  # Checkpoint 间隔（毫秒）
  checkpoint-interval: 30000

  # Checkpoint 模式：EXACTLY_ONCE 或 AT_LEAST_ONCE
  checkpoint-mode: EXACTLY_ONCE

  # Checkpoint 超时时间（毫秒）
  checkpoint-timeout: 600000

  # 最小 Checkpoint 间隔（毫秒）
  min-pause-between-checkpoints: 500

  # 最大并发 Checkpoint 数
  max-concurrent-checkpoints: 1

  # 状态后端类型：rocksdb 或 hashmap
  state-backend: rocksdb

  # 是否启用增量 Checkpoint（仅 RocksDB 支持）
  incremental-checkpoint: true

# =====================================================
# 日志配置
# =====================================================
logging:
  level:
    root: INFO
    com.example.flinkminio: DEBUG
    org.apache.flink: INFO

# =====================================================
# Actuator 配置
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
